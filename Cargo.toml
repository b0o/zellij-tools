[package]
name = "zellij-tools"
version = "0.1.0"
authors = ["Maddison Hellstrom <hi@maddison.io>"]
edition = "2021"
license = "MIT"
rust-version = "1.84"

[lib]
name = "zellij_tools"
path = "src/lib.rs"

[[bin]]
name = "zellij-tools"
path = "src/main.rs"

[dependencies]
zellij-tile = "0.42.2"
zellij-tile-utils = "0.42.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
kdl = "4"
