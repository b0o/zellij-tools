---
name: Release
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-plugin:
    name: Build Plugin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Build plugin
        run: nix build .#default

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: zellij-tools.wasm
          path: result/share/zellij/plugins/zellij-tools.wasm

  build-cli:
    name: Build CLI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
            package: cli
          - os: macos-latest
            target: x86_64-darwin
            package: packages.x86_64-darwin.cli
          - os: macos-latest
            target: aarch64-darwin
            package: cli
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Build CLI
        run: nix build .#${{ matrix.package }}

      - name: Package CLI
        run: tar czf zellij-tools-${{ matrix.target }}.tar.gz -C result/bin zellij-tools

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: zellij-tools-${{ matrix.target }}
          path: zellij-tools-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: [build-plugin, build-cli]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-tags: false # https://github.com/actions/checkout/issues/1467

      - run: git fetch --tags --all --force && git pull origin ${{ github.ref }} --unshallow --force
        name: Fetch tags manually as a workaround. See https://github.com/actions/checkout/issues/1467

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: -vv --latest --strip header
        env:
          OUTPUT: CHANGES.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          draft: false
          body: ${{ steps.git-cliff.outputs.content }}
          prerelease: false
          files: |
            artifacts/zellij-tools.wasm/zellij-tools.wasm
            artifacts/zellij-tools-*/zellij-tools-*.tar.gz
